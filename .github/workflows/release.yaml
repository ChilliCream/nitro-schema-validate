name: 🔄 Update Nitro CLI Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to update to
        required: true
        type: string
      is_stable:
        description: Whether this version is a stable (X.Y.Z) release.
        required: true
        type: boolean
      is_active_major:
        description: Whether this version targets the top lane (version.major >= highest stable major).
        required: true
        type: boolean
      correlation_id:
        description: Correlation ID for caller tracking
        required: true
        type: string

run-name: "🔄 Update to ${{ inputs.version }} [${{ inputs.correlation_id }}]"

permissions:
  contents: write

jobs:
  update:
    uses: ChilliCream/nitro-github-actions/.github/workflows/update-cli-version.yaml@main
    with:
      version: ${{ inputs.version }}
      is_stable: ${{ inputs.is_stable }}
      is_active_major: ${{ inputs.is_active_major }}
